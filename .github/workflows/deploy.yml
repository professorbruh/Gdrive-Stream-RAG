name: Test & Deploy to Oracle Cloud

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python Tests ──────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Python tests
        run: pytest tests/ -v --tb=short

      # ── JavaScript Tests ──────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: tests/js
        run: npm install

      - name: Run JS tests
        working-directory: tests/js
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
        with:
          host: ${{ secrets.OCI_HOST_IP }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: APP_DOMAIN
          script: |
            # Export the domain for the deployment script
            export APP_DOMAIN=$APP_DOMAIN
            
            # Run the deployment script on the Oracle VM
            bash ~/Gdrive-Stream-RAG/scripts/deploy.sh
