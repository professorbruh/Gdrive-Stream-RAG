name: Test & Deploy to Oracle Cloud

on:
  push:
    branches:
      - master

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Python tests
        run: pytest tests/ -v --tb=short

  test-js:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        working-directory: tests/js
        run: npm install

      - name: Run JS tests
        working-directory: tests/js
        run: npm test

  deploy:
    needs: [test-python, test-js]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          LLM_MODE: ${{ secrets.LLM_MODE }}
          LLM_REMOTE_URL: ${{ secrets.LLM_REMOTE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OCI_APM_ENDPOINT: ${{ secrets.OCI_APM_ENDPOINT }}
          OCI_APM_DATA_KEY: ${{ secrets.OCI_APM_DATA_KEY }}
        with:
          host: ${{ secrets.OCI_HOST_IP }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          envs: APP_DOMAIN,HF_TOKEN,LLM_MODE,LLM_REMOTE_URL,LLM_API_KEY,OCI_APM_ENDPOINT,OCI_APM_DATA_KEY
          script: |
            # Export the variables and generate the .env file directly on the VM
            export APP_DOMAIN=$APP_DOMAIN
            
            echo "Generating .env file from CI/CD secrets..."
            cat <<EOF > ~/Gdrive-Stream-RAG/.env
            HF_TOKEN=$HF_TOKEN
            LLM_MODE=$LLM_MODE
            LLM_REMOTE_URL=$LLM_REMOTE_URL
            LLM_API_KEY=$LLM_API_KEY
            OCI_APM_ENDPOINT=$OCI_APM_ENDPOINT
            OCI_APM_DATA_KEY=$OCI_APM_DATA_KEY
            EOF
            chmod 600 ~/Gdrive-Stream-RAG/.env
            
            # Run the deployment script on the Oracle VM
            bash ~/Gdrive-Stream-RAG/scripts/deploy.sh
